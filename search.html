<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>快速搜索标签页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="search.css">
</head>
<body>
  <div class="search-container">
    <div class="search-input-wrapper">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M14 14L18 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="搜索已打开的标签页..." autocomplete="off" autofocus>
      <span class="hint">ESC 关闭</span>
    </div>
    <div class="results" id="results"></div>
    <div class="footer-hint">
      <span>↑↓ 选择</span>
      <span>↵ 打开</span>
      <span>⌥↵ 切换</span>
      <span>⌘+K 聚焦搜索</span>
    </div>
  </div>
  <script src="search.js"></script>
</body>
</html>
